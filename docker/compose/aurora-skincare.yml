services:
  laravel:
    build:
      context: ./clients/aurora-skincare
      dockerfile: Dockerfile
    container_name: active-ecommerce-laravel
    ports:
      - "${APP_PORT:-8080}:80"
    volumes:
      # Host .env is source of truth (DB, keys) — same as local; publish does not bake secrets into the image.
      - ./clients/aurora-skincare/.env:/var/www/html/.env
    environment:
      APP_ENV: local
      APP_DEBUG: "true"
      APP_URL: ${APP_URL:-http://localhost:${APP_PORT:-8080}}
      ASSET_URL: ${ASSET_URL:-http://localhost:${APP_PORT:-8080}}
      FORCE_HTTPS: ${FORCE_HTTPS:-Off}
      # All DB_* must come from .env — any compose DB_* overrides .env and breaks remote/local DB.
    extra_hosts:
      - "host.docker.internal:host-gateway"
