services:
  laravel:
    build:
      context: ./clients/aurora-skincare
      dockerfile: Dockerfile
    container_name: active-ecommerce-laravel
    ports:
      - "${APP_PORT:-8080}:80"
    environment:
      APP_ENV: local
      APP_DEBUG: "true"
      APP_URL: ${APP_URL:-http://localhost:${APP_PORT:-8080}}
      ASSET_URL: ${ASSET_URL:-http://localhost:${APP_PORT:-8080}}
      FORCE_HTTPS: ${FORCE_HTTPS:-Off}
      DB_CONNECTION: mysql
      DB_HOST: ${DB_HOST:-host.docker.internal}
      DB_PORT: ${DB_PORT:-3306}
      DB_DATABASE: ${DB_DATABASE:-aurora_skin}
      DB_USERNAME: ${DB_USERNAME:-root}
      DB_PASSWORD: ${DB_PASSWORD:-}
    extra_hosts:
      - "host.docker.internal:host-gateway"
